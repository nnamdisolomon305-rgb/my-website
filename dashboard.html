<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #141e30;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        button {
            padding: 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Welcome to Dashboard 🎉</h1>

    <p>You are logged in successfully.</p>

    <button onclick="logout()">Logout</button>

    <script>
        function logout() {
            window.location.href = "index.html";
        }
    </script>

</body>

</html>
