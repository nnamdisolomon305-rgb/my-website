<!DOCTYPE html>
<html>

<head>
    <title>Login App</title>

    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            margin: 0;
        }

        .box {
            background: #1e1e2f;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 260px;
        }

        input {
            padding: 10px;
            margin: 10px 0;
            width: 90%;
            border: none;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            background: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        #result {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>

        <p id="result"></p>
    </div>

    <script>
        function login() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            if (user === "" || pass === "") {
                document.getElementById("result").innerText = " Please fill all fields";
            }
            else if (user === "admin" && pass === "1234") {
                window.location.href = "dashboard.html?user=" + user;
            }
            else {
                document.getElementById("result").innerText = "❌ Invalid Username or Password";
            }
        }
    </script>

</body>

</html>
